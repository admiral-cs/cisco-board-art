<!DOCTYPE html>
<html>
<head>
  <title>Art Display</title>

  <!-- Character encoding and responsive viewport -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Prevent the browser from caching old slide content -->
  <meta http-equiv="Cache-Control" content="no-cache">

  <!-- Start loading Google resources early so slides appear faster -->
  <link rel="preconnect" href="https://docs.google.com">
  <link rel="preconnect" href="https://lh3.googleusercontent.com">

  <style>
    /* Remove default margins and make the page fill the entire screen.
       Black background hides any flash of white while slides load. */
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Stretch the Google Slides iframe to cover the full viewport.
       "inset: 0" pins all four edges to the window. */
    iframe {
      position: absolute;
      inset: 0;
      border: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <!--
    Google Slides embed iframe.
    Key URL parameters:
      start=true   — auto-advance slides on load
      loop=true    — restart from the first slide after the last one
      delayms=     — milliseconds between slides (600000 = 10 minutes)
      rm=minimal   — hide the Google Slides toolbar
    To use your own slides, replace the URL below with your presentation's
    embed link (File > Share > Publish to web > Embed).
  -->
  <iframe
    src="https://docs.google.com/presentation/d/e/2PACX-1vTUK76kNzJhAFCoyfSKRyAg_Jv1WuRAhG4feBfFnLBxM5JCNS8Ybcc6EH08gw0r5RGEvcyDxAKncfu6/embed?start=true&loop=true&delayms=600000&rm=minimal"
    allowfullscreen
  ></iframe>

  <!-- Shown only if JavaScript is disabled (unlikely on modern browsers,
       but a helpful fallback message just in case) -->
  <noscript>
    <p style="color: white; text-align: center;">Slides blocked or offline</p>
  </noscript>
</body>
</html>
